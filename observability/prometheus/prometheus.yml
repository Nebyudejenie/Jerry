global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: terry
    env: ${ENV:-homelab}

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs: [{ targets: ["localhost:9090"] }]

  - job_name: node
    static_configs: [{ targets: ["node-exporter:9100"] }]

  - job_name: cadvisor
    static_configs: [{ targets: ["cadvisor:8080"] }]

  - job_name: traefik
    static_configs: [{ targets: ["traefik:8082"] }]

  - job_name: terry-router
    metrics_path: /metrics
    static_configs: [{ targets: ["terry-router:8088"] }]

  - job_name: n8n
    metrics_path: /metrics
    static_configs: [{ targets: ["n8n:5678"] }]

  - job_name: postgres
    static_configs: [{ targets: ["postgres-exporter:9187"] }]
