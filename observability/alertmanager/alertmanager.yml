global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: telegram-default
  routes:
    - matchers: [severity="critical"]
      receiver: telegram-critical
      continue: true

receivers:
  - name: telegram-default
    webhook_configs:
      - url: "http://n8n-webhook:5678/webhook/terry/alertmanager"
        send_resolved: true

  - name: telegram-critical
    webhook_configs:
      - url: "http://n8n-webhook:5678/webhook/terry/alertmanager?severity=critical"
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, instance]
